services:
  postgres:
    image: postgres:17-alpine
    container_name: monorepo-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: mono
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d mono"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
