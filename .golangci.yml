# golangci-lint v2 configuration.
# The depguard rules enforce module isolation: a module may only reach another
# module through its public *port package, never its domain/service/repository.
version: "2"

linters:
  enable:
    - depguard
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    depguard:
      rules:
        payment-module:
          files:
            - "**/internal/modules/payment/**/*.go"
          deny:
            - pkg: github.com/monorepo/internal/modules/account/domain
              desc: "use accountport instead of reaching into account internals"
            - pkg: github.com/monorepo/internal/modules/account/service
              desc: "use accountport instead of reaching into account internals"
            - pkg: github.com/monorepo/internal/modules/account/repository
              desc: "use accountport instead of reaching into account internals"
        account-module:
          files:
            - "**/internal/modules/account/**/*.go"
          deny:
            - pkg: github.com/monorepo/internal/modules/payment/domain
              desc: "use paymentport instead of reaching into payment internals"
            - pkg: github.com/monorepo/internal/modules/payment/service
              desc: "use paymentport instead of reaching into payment internals"
            - pkg: github.com/monorepo/internal/modules/payment/repository
              desc: "use paymentport instead of reaching into payment internals"
