# golangci-lint v2 configuration.
#
# Module isolation is now enforced by the Go compiler via the internal/
# package mechanism: anything under internal/modules/<name>/internal/ is
# unreachable from outside that module. Cross-module deny rules are no longer
# needed here. depguard will come back in Phase 4 when we need to forbid
# leaking concrete provider names (visa, kortimilli, etc.) outside the
# provider module.
version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
